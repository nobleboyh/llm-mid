# GateMid — Team Smart Router + Headroom Compression
# LiteLLM Proxy Configuration
#
# Headroom runs as ASGI middleware (proxy/startup.py), not via callbacks.
# Middleware fires at HTTP level, more reliable than callback hooks.

model_list:
  # Tier 1: Fast / Simple models
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY"

  - model_name: deepseek-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: "os.environ/DEEPSEEK_API_KEY"

  # Tier 2: Capable / Complex models
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: "os.environ/GEMINI_API_KEY"

  - model_name: deepseek-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: "os.environ/DEEPSEEK_API_KEY"

  # Team Smart Router — auto-classifies and routes
  - model_name: team-smart-router
    litellm_params:
      model: auto_router/complexity_router
      complexity_router_config:
        tiers:
          SIMPLE: deepseek-flash
          MEDIUM: deepseek-flash
          COMPLEX: deepseek-pro
          REASONING: deepseek-pro
        # Claude Code sends ~500+ tokens of system prompt per request.
        # Defaults are tuned for standalone prompts, not agentic tools.
        token_thresholds:
          simple: 100        # below 100 tokens → penalize as too simple
          complex: 2000      # above 2000 tokens → boost complexity (was 400)
        dimension_weights:
          tokenCount: 0.05       # reduce — system prompt always adds tokens
          codePresence: 0.10     # reduce — system prompt has "let", "api", etc.
          reasoningMarkers: 0.30  # keep — user-written, reliable signal
          technicalTerms: 0.10   # reduce — system prompt has technical words
          simpleIndicators: 0.15  # boost — helps classify greetings correctly
          multiStepPatterns: 0.05
          questionComplexity: 0.05
        tier_boundaries:
          simple_medium: 0.20       # higher threshold to reach MEDIUM
          medium_complex: 0.45      # higher threshold to reach COMPLEX
          complex_reasoning: 0.65   # higher threshold to reach REASONING
      complexity_router_default_model: deepseek-flash

litellm_settings:
  drop_params: true
  # Headroom is now ASGI middleware (proxy/startup.py) — no callbacks needed.
  # Middleware fires at HTTP level, more reliable than callback hooks.
  # No callbacks configured — Headroom uses ASGI middleware instead.

general_settings:
  master_key: "os.environ/GATEWAY_MASTER_KEY"
